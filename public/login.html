<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Final Cleaning Solutions Inc. — Login</title>
  <link rel="icon" type="image/png" href="FCS-Logo-remove.png">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #16213e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #login-box {
      background: #1e293b;
      border-radius: 16px;
      padding: 40px 36px;
      width: 100%;
      max-width: 360px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      box-shadow: 0 24px 64px rgba(0,0,0,.4);
    }

    #login-logo  { width: 64px; height: 64px; object-fit: contain; margin-bottom: 4px; }
    #login-title { font-size: 16px; font-weight: 700; color: #f1f5f9; text-align: center; }
    #login-sub   { font-size: 12px; color: #475569; margin-bottom: 8px; }

    input {
      width: 100%;
      padding: 10px 12px;
      background: rgba(255,255,255,.07);
      border: 1.5px solid rgba(255,255,255,.1);
      border-radius: 8px;
      color: #f1f5f9;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    input::placeholder { color: #475569; }
    input:focus { border-color: rgba(59,130,246,.5); }

    button {
      width: 100%;
      padding: 12px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #2563eb; }

    #login-err {
      font-size: 12px;
      color: #f87171;
      min-height: 16px;
      text-align: center;
    }

    @media (max-width: 420px) {
      #login-box { padding: 32px 20px; }
    }
  </style>
</head>
<body>
  <div id="login-box">
    <img src="FCS-Logo-remove.png" id="login-logo" alt="FCS Logo">
    <div id="login-title">Final Cleaning Solutions Inc.</div>
    <div id="login-sub">Employee Dashboard</div>
    <input type="password" id="login-pw" placeholder="Enter password"
      onkeydown="if(event.key==='Enter') doLogin()">
    <button onclick="doLogin()">Sign In</button>
    <div id="login-err"></div>
  </div>

  <script>
    // If already logged in, go straight to the dashboard
    if (localStorage.getItem('fcs-token')) {
      window.location.replace('/');
    }

    async function doLogin() {
      const pw  = document.getElementById('login-pw').value;
      const err = document.getElementById('login-err');
      if (!pw) { err.textContent = 'Please enter the password.'; return; }

      try {
        const res  = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: pw }),
        });
        const data = await res.json();
        if (!res.ok) { err.textContent = 'Incorrect password. Try again.'; return; }
        localStorage.setItem('fcs-token', data.token);
        window.location.replace('/');
      } catch (e) {
        err.textContent = 'Could not connect. Try again.';
      }
    }
  </script>
</body>
</html>
