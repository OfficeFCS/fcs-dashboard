<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="FCS-Logo-remove.png">
  <link rel="apple-touch-icon" href="FCS-Logo-remove.png">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FCS Dashboard">
  <meta name="theme-color" content="#16213e">
  <title>Final Cleaning Solutions Inc. — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ================================================
       SIDEBAR
       Left panel with Jobs and Employees tabs.
       All editing happens here — not on the whiteboard.
       ================================================ -->
  <div id="sidebar">

    <!-- Company header -->
    <div id="slogo">
      <img src="FCS-Logo-remove.png" id="slogo-img" alt="FCS Logo">
      <div>
        <div class="co">Employee Dashboard</div>
        <div class="ti">Final Cleaning Solutions Inc.</div>
      </div>
    </div>

    <!-- Tab toggle buttons -->
    <div class="tabs">
      <button class="tbtn on" id="tb-jobs"      onclick="switchTab('jobs')">Jobs</button>
      <button class="tbtn"    id="tb-employees" onclick="switchTab('employees')">Employees</button>
    </div>

    <!-- Jobs tab -->
    <div class="tpane on" id="tp-jobs">
      <input class="srch" id="srch-j" type="text" placeholder="Search jobs..." oninput="renderJobs()">
      <button class="cbtn" onclick="openCreateJob()">+ New Job</button>
      <div id="jlist" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>

    <!-- Employees tab -->
    <div class="tpane" id="tp-employees">
      <input class="srch" id="srch-e" type="text" placeholder="Search employees..." oninput="renderEmps()">
      <button class="cbtn" onclick="openCreateEmp()">+ New Employee</button>
      <div id="elist" style="display:flex;flex-direction:column;gap:6px"></div>
    </div>

  </div><!-- /sidebar -->

  <!-- Dims the whiteboard when the sidebar is open on mobile -->
  <div id="sb-ov" onclick="closeSidebar()"></div>


  <!-- ================================================
       WHITEBOARD
       Main canvas showing active jobs and their
       assigned employees connected by lines.
       Desktop: drag employees from sidebar onto job cards.
       Mobile: tap "+ Assign" on an employee, then tap a job.
       ================================================ -->
  <div id="wb">
    <div id="wbhdr">
      <!-- Hamburger button — only visible on mobile -->
      <button id="menu-btn" onclick="toggleSidebar()">☰</button>
      <img src="FCS-Logo-remove.png" id="wbhdr-img" alt="FCS Logo">
      <div id="wbhdr-text">
        <h2>Active Jobs Board</h2>
        <p>Drag employees onto job cards to assign them</p>
      </div>
      <button id="fit-btn" onclick="zoomToFit()" title="Fit all jobs to screen">⤢ Fit</button>
      <button id="signout-btn" onclick="signOut()">Sign Out</button>
    </div>

    <!-- SVG layer for connecting lines — outside wb-inner so it is not zoom-transformed -->
    <svg id="svg"></svg>

    <!-- Inner canvas — gets CSS scale transform applied by zoomToFit() -->
    <div id="wb-inner">
      <!-- Absolutely-positioned job and employee cards -->
      <div id="wbc"></div>
    </div>
  </div><!-- /wb -->


  <!-- Toast shown while dragging an employee (desktop) -->
  <div id="dhint">Drop on a job card to assign</div>

  <!-- Banner shown when an employee is selected for tap-to-assign (mobile) -->
  <div id="assign-hint"></div>

  <!-- Dim overlay behind open edit panels -->
  <div id="ov" onclick="closePanel()"></div>


  <!-- ================================================
       JOB EDIT PANEL
       Slides in from the right when editing a job.
       ================================================ -->
  <div class="ep" id="ep-job">
    <div class="eph">
      <div class="ept" id="ep-job-t">New Job</div>
      <button class="epc" onclick="closePanel()">×</button>
    </div>

    <div class="ff">
      <label class="fl">Job Name *</label>
      <input class="fi" id="fj-name" type="text" placeholder="e.g. Downtown Office">
    </div>
    <div class="ff">
      <label class="fl">Contractor</label>
      <input class="fi" id="fj-con" type="text" placeholder="Contractor name">
    </div>
    <div class="ff">
      <label class="fl">Phone</label>
      <input class="fi" id="fj-ph" type="tel" placeholder="555-0100">
    </div>
    <div class="ff">
      <label class="fl">Email</label>
      <input class="fi" id="fj-em" type="email" placeholder="contractor@email.com">
    </div>
    <div class="ff">
      <label class="fl">Address</label>
      <input class="fi" id="fj-ad" type="text" placeholder="123 Main St">
    </div>
    <div style="display:flex;gap:8px">
      <div class="ff" style="flex:1">
        <label class="fl">Start Date</label>
        <input class="fi" id="fj-sd" type="date">
      </div>
      <div class="ff" style="flex:1">
        <label class="fl">End Date</label>
        <input class="fi" id="fj-ed" type="date">
      </div>
    </div>
    <div class="ff">
      <label class="fl">Start Time</label>
      <input class="fi" id="fj-tm" type="time">
    </div>
    <div class="ff">
      <label class="fl">Status</label>
      <select class="fs" id="fj-st">
        <option value="active">Active</option>
        <option value="inactive">Inactive</option>
      </select>
    </div>

    <div class="ea2">
      <button class="btn bs"  onclick="closePanel()">Cancel</button>
      <button class="btn bp2" onclick="saveJob()">Save</button>
      <button class="btn bd"  id="del-job" onclick="confirmDelJob()" style="display:none">Delete</button>
    </div>
  </div><!-- /ep-job -->


  <!-- ================================================
       EMPLOYEE EDIT PANEL
       Slides in from the right when editing an employee.
       ================================================ -->
  <div class="ep" id="ep-emp">
    <div class="eph">
      <div class="ept" id="ep-emp-t">New Employee</div>
      <button class="epc" onclick="closePanel()">×</button>
    </div>

    <div class="ff">
      <label class="fl">Name *</label>
      <input class="fi" id="fe-name" type="text" placeholder="Full name">
    </div>
    <div class="ff">
      <label class="fl">Phone</label>
      <input class="fi" id="fe-ph" type="tel" placeholder="555-0100">
    </div>
    <div class="ff">
      <label class="fl">Level</label>
      <select class="fs" id="fe-lv" onchange="onLvChange()">
        <option value="foreman">Foreman</option>
        <option value="journeyman">Journeyman</option>
        <option value="apprentice">Apprentice</option>
      </select>
    </div>

    <!-- Only shown when Apprentice is selected -->
    <div class="ff" id="fe-alw" style="display:none">
      <label class="fl">Apprentice Level</label>
      <select class="fs" id="fe-al">
        <option value="1">Level 1</option>
        <option value="2">Level 2</option>
        <option value="3">Level 3</option>
        <option value="4">Level 4</option>
        <option value="5">Level 5</option>
        <option value="6">Level 6</option>
      </select>
    </div>

    <div class="ff">
      <label class="fl">Availability</label>
      <select class="fs" id="fe-av">
        <option value="available">Available</option>
        <option value="leave">On Leave</option>
        <option value="unavailable">Cannot Work</option>
      </select>
    </div>

    <!-- Only shown when the employee is assigned to a job -->
    <div class="ff" id="fe-asgw" style="display:none">
      <label class="fl">Current Assignment</label>
      <div class="ainfo">
        <span id="fe-asgn">—</span>
        <button class="ug" onclick="unassign()">Unassign</button>
      </div>
    </div>

    <div class="ea2">
      <button class="btn bs"  onclick="closePanel()">Cancel</button>
      <button class="btn bp2" onclick="saveEmp()">Save</button>
      <button class="btn bd"  id="del-emp" onclick="confirmDelEmp()" style="display:none">Delete</button>
    </div>
  </div><!-- /ep-emp -->


<script src="app.js"></script>
</body>
</html>
